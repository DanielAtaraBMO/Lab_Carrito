<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorio Carrito</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container-badge">
      <img id="badge-id" src="Logo.png" alt="Logo" />
      <h1>Tecno Pollo</h1>
      <div id="compras">
        <h1>🛒(<span id="badge">0</span>)</h1>
      </div>
    </div>

    <div class="tienda" class="container">
      <div class="container text-center">
        <div class="row">
          <div class="col tarjeta">
            Teclado Gamer Tecnopollo
            <p>Precio : $542.000.00</p>
            <img src="Teclado.png" alt="Teclado" />
            <p></p>
            <button
              type="button"
              class="btn btn-dark btn-agregar"
              data-nombre="Teclado Gamer Tecnopollo"
              data-precio="542000"
            >
              Agregar
            </button>
          </div>
          <div class="col tarjeta">
            Mouse Gamer Tecnopollo
            <p>Precio : $292.000.00</p>

            <img src="Mouse.png" alt="Mouse" />
            <p></p>
            <button
              type="button"
              class="btn btn-dark btn-agregar"
              data-nombre="Mouse Gamer Tecnopollo"
              data-precio="292000"
            >
              Agregar
            </button>
          </div>
          <div class="col tarjeta">
            Audifonos Gamer Tecnopollo
            <p>Precio : $426.000.00</p>
            <img src="Audifonos.png" alt="Audifonos" />
            <p></p>
            <button
              type="button"
              class="btn btn-dark btn-agregar"
              data-nombre="Audifonos Gamer Tecnopollo"
              data-precio="426000"
            >
              Agregar
            </button>
          </div>
          <div class="col tarjeta">
            Alfombrilla Gamer Tecnopollo
            <p>Precio : $52.000.00</p>

            <img src="Alfonbra.png" alt="Alfombrilla" />
            <p></p>
            <button
              type="button"
              class="btn btn-dark btn-agregar"
              data-nombre="Alfombrilla Gamer Tecnopollo"
              data-precio="52000"
            >
              Agregar
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="Carrito" class="container">
      <h2>Tu Carrito</h2>
      <p id="carrito-vacio">Tu carrito está vacío</p>
      <div class="container text-center">
        <div id="separar">
          <ul id="lista-carrito"></ul>
          <button id="btn-vaciar" type="button" class="btn btn-dark">
            Vaciar Carrito
          </button>
          <p>Total: $<span id="total-carrito">0</span></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
